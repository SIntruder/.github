<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#0f172a"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="195" r="155" fill="none" stroke="#10b981" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="200" cy="195" r="170" fill="none" stroke="#10b981" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M200 45 L310 95 L310 200 C310 280 200 350 200 350 C200 350 90 280 90 200 L90 95 Z"
        fill="url(#shieldFill)" stroke="url(#shieldGrad)" stroke-width="3"/>

  <!-- Inner shield border -->
  <path d="M200 65 L295 108 L295 200 C295 268 200 330 200 330 C200 330 105 268 105 200 L105 108 Z"
        fill="none" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Circuit patterns - horizontal lines -->
  <line x1="120" y1="140" x2="170" y2="140" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="140" x2="280" y2="140" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="180" x2="155" y2="180" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="245" y1="180" x2="280" y2="180" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="130" y1="220" x2="160" y2="220" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="240" y1="220" x2="270" y2="220" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="145" y1="260" x2="170" y2="260" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="260" x2="255" y2="260" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Circuit patterns - vertical lines -->
  <line x1="150" y1="120" x2="150" y2="155" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="250" y1="120" x2="250" y2="155" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="200" x2="140" y2="240" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="260" y1="200" x2="260" y2="240" stroke="url(#circuitGrad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Network nodes - outer ring -->
  <circle cx="150" cy="120" r="4" fill="#10b981" filter="url(#glow)"/>
  <circle cx="250" cy="120" r="4" fill="#10b981" filter="url(#glow)"/>
  <circle cx="120" cy="180" r="3.5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="280" cy="180" r="3.5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="130" cy="220" r="3" fill="#10b981" filter="url(#glow)"/>
  <circle cx="270" cy="220" r="3" fill="#10b981" filter="url(#glow)"/>
  <circle cx="145" cy="260" r="3" fill="#10b981" filter="url(#glow)"/>
  <circle cx="255" cy="260" r="3" fill="#10b981" filter="url(#glow)"/>
  <circle cx="170" cy="140" r="3" fill="#10b981" filter="url(#glow)"/>
  <circle cx="230" cy="140" r="3" fill="#10b981" filter="url(#glow)"/>

  <!-- Central "SI" monogram -->
  <!-- S letter -->
  <path d="M168 172 C168 166, 174 160, 184 160 C194 160, 200 166, 200 172 C200 178, 194 184, 184 184 C174 184, 168 190, 168 196 C168 202, 174 208, 184 208 C194 208, 200 202, 200 196"
        fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- I letter -->
  <line x1="216" y1="160" x2="216" y2="208" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="208" y1="160" x2="224" y2="160" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="208" y1="208" x2="224" y2="208" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- Connection lines from SI to nodes -->
  <line x1="175" y1="155" x2="160" y2="145" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="225" y1="155" x2="240" y2="145" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="165" y1="195" x2="145" y2="215" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="230" y1="195" x2="255" y2="215" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Top shield accent -->
  <path d="M200 50 L200 70" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <circle cx="200" cy="48" r="3" fill="#10b981" filter="url(#glow)"/>

  <!-- Bottom keyhole accent -->
  <circle cx="200" cy="300" r="5" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="200" y1="305" x2="200" y2="320" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Subtle scan lines -->
  <line x1="110" y1="155" x2="290" y2="155" stroke="#10b981" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="115" y1="200" x2="285" y2="200" stroke="#10b981" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="125" y1="245" x2="275" y2="245" stroke="#10b981" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="150" y1="290" x2="250" y2="290" stroke="#10b981" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Version badge -->
  <text x="200" y="385" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10" letter-spacing="2">DEFENSIVE INTELLIGENCE</text>
</svg>